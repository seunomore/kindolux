<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KindoLux — Coming Soon</title>
<meta name="description" content="KindoLux — a curated store of quality goods. Launching soon.">
<meta property="og:title" content="KindoLux — Coming Soon">
<meta property="og:description" content="A curated store of quality goods. Launching soon.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240'%3E%3Cpath d='M62 44H182L62 168V44Z' fill='%23262428'/%3E%3Cpath d='M110 194L110 122C129 122 147.4 129.6 160.9 143.1C174.4 156.6 182 174.9 182 194L110 194Z' fill='%23FF6B5E'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600;700;800&display=swap');
  :root{
    --graphite:#262428; --graphite-soft:#3A3640;
    --coral:#FF6B5E; --coral-deep:#E8503F; --coral-soft:#FFB3AB;
    --paper:#F8F5F4; --paper2:#FFFFFF; --text:#262428; --muted:#928c97; --hair:#ECE7E6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Sora',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px 28px;background:var(--paper);position:relative;overflow-x:hidden}
  .amb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
  .amb1{width:520px;height:520px;background:rgba(255,107,94,.14);top:-160px;right:-120px}
  .amb2{width:440px;height:440px;background:rgba(58,54,64,.07);bottom:-180px;left:-120px}
  .amb3{width:300px;height:300px;background:rgba(255,179,171,.12);bottom:20%;right:14%}
  .grid-tex{position:fixed;inset:0;z-index:0;opacity:.4;background-image:linear-gradient(var(--hair) 1px,transparent 1px),linear-gradient(90deg,var(--hair) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at 50% 45%,#000,transparent 72%);-webkit-mask-image:radial-gradient(circle at 50% 45%,#000,transparent 72%)}
  .deco{position:fixed;z-index:1;pointer-events:none}
  .d1{top:15%;left:10%;animation:bob 5.5s ease-in-out infinite}
  .d2{bottom:17%;right:11%;animation:bob 6.5s ease-in-out infinite .6s}
  .d3{top:22%;right:17%;animation:bob 4.8s ease-in-out infinite .3s}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(6deg)}}
  .wrap{max-width:580px;text-align:center;position:relative;z-index:2;margin:auto 0}
  .badge{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--hair);border-radius:30px;padding:7px 16px 7px 10px;font-size:11px;letter-spacing:1px;color:var(--muted);font-weight:500;margin-bottom:34px;box-shadow:0 6px 20px rgba(38,36,40,.05);opacity:0;animation:fade 1s ease .05s forwards}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:var(--coral);position:relative}
  .badge .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--coral);opacity:.4;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.8);opacity:0}}
  .logo{margin-bottom:26px;opacity:0;animation:rise 1s cubic-bezier(.2,.7,.3,1) .15s forwards}
  .logo svg{filter:drop-shadow(0 16px 34px rgba(38,36,40,.18))}
  .wordmark{font-size:clamp(48px,9vw,76px);font-weight:200;letter-spacing:.5px;line-height:1;margin-bottom:16px;opacity:0;animation:rise 1s cubic-bezier(.2,.7,.3,1) .3s forwards}
  .wordmark b{font-weight:700;color:var(--coral)}
  .tagline{font-size:12px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:44px;opacity:0;animation:fade 1s ease .5s forwards}
  .headline{font-size:clamp(27px,4.2vw,38px);font-weight:600;line-height:1.18;margin-bottom:16px;opacity:0;animation:rise 1s ease .65s forwards}
  .headline span{color:var(--coral)}
  .sub{font-size:15px;font-weight:300;color:var(--muted);line-height:1.85;max-width:430px;margin:0 auto 40px;opacity:0;animation:fade 1s ease .8s forwards}
  form.signup{display:flex;gap:10px;max-width:450px;margin:0 auto;opacity:0;animation:rise 1s ease .95s forwards}
  form.signup input[type=email]{flex:1;background:var(--paper2);border:1.5px solid var(--hair);border-radius:13px;padding:16px 18px;font-family:'Sora';font-size:14px;color:var(--text);transition:border .2s,box-shadow .2s}
  form.signup input::placeholder{color:#bbb5bd}
  form.signup input:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 4px rgba(255,107,94,.13)}
  form.signup button{background:var(--graphite);color:#fff;border:none;border-radius:13px;padding:16px 28px;font-family:'Sora';font-weight:600;font-size:14px;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap}
  form.signup button:hover{background:var(--coral-deep);transform:translateY(-1px)}
  .msg{font-size:13px;margin-top:15px;height:18px;color:var(--coral-deep);font-weight:500}
  .socials{display:flex;gap:11px;justify-content:center;margin-top:40px;opacity:0;animation:fade 1s ease 1.1s forwards}
  .socials a{width:44px;height:44px;border-radius:13px;background:var(--paper2);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--graphite);text-decoration:none;font-size:12px;font-weight:600;transition:.22s}
  .socials a:hover{border-color:var(--coral);color:var(--coral);transform:translateY(-3px);box-shadow:0 10px 22px rgba(255,107,94,.18)}
  .foot{margin-top:48px;text-align:center;font-size:11px;letter-spacing:1px;color:var(--muted);opacity:0;animation:fade 1s ease 1.3s forwards;line-height:1.7;padding:0 10px}
  .foot a{color:var(--coral);text-decoration:none}
  @keyframes fade{to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:520px){form.signup{flex-direction:column}form.signup button{width:100%}.deco{opacity:.4}.foot{font-size:10.5px;margin-top:36px}.foot a{display:inline-block;margin-top:3px}}
</style>
</head>
<body>
  <div class="amb amb1"></div><div class="amb amb2"></div><div class="amb amb3"></div>
  <div class="grid-tex"></div>
  <svg class="deco d1" width="38" height="38" viewBox="0 0 40 40"><circle cx="20" cy="20" r="15" fill="#FF6B5E" opacity=".65"/></svg>
  <svg class="deco d2" width="50" height="50" viewBox="0 0 52 52"><rect x="9" y="9" width="34" height="34" rx="10" fill="#3A3640" opacity=".45"/></svg>
  <svg class="deco d3" width="32" height="32" viewBox="0 0 34 34"><circle cx="17" cy="17" r="12" fill="none" stroke="#FF6B5E" stroke-width="3" opacity=".55"/></svg>
  <div class="wrap">
    <div class="badge"><span class="dot"></span> Launching Soon</div>
    <div class="logo">
      <svg width="86" height="86" viewBox="0 0 240 240">
        <path d="M62 44H182L62 168V44Z" fill="#262428"/>
        <path d="M110 194L110 122C129 122 147.4 129.6 160.9 143.1C174.4 156.6 182 174.9 182 194L110 194Z" fill="#FF6B5E"/>
      </svg>
    </div>
    <div class="wordmark">Kindo<b>Lux</b></div>
    <div class="tagline">Curated Quality Goods</div>
    <div class="headline">Something good is <span>on the way.</span></div>
    <p class="sub">We're putting together a store of products chosen with care. Drop your email and be the first to shop when we open.</p>
    <form class="signup" action="https://formspree.io/f/meedlopq" method="POST" id="signupForm">
      <input type="email" name="email" id="email" placeholder="Enter your email" required>
      <input type="hidden" name="_subject" value="New KindoLux waitlist signup!">
      <button type="submit">Notify Me</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="socials">
      <a href="#" title="Instagram">IG</a>
      <a href="#" title="TikTok">TT</a>
      <a href="mailto:hello@kindolux.com" title="Email">@</a>
    </div>
  </div>
  <div class="foot">© 2026 KindoLux LLC · <a href="mailto:hello@kindolux.com">hello@kindolux.com</a></div>
<script>
const form=document.getElementById('signupForm');
const msg=document.getElementById('msg');
form.addEventListener('submit',async(e)=>{
  e.preventDefault();
  const data=new FormData(form);
  const email=data.get('email').trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){msg.textContent='Please enter a valid email.';msg.style.color='#c0392b';return;}
  msg.textContent='Sending…';msg.style.color='#928c97';
  try{
    const res=await fetch(form.action,{method:'POST',body:data,headers:{'Accept':'application/json'}});
    if(res.ok){msg.textContent='✓ Thank you! See you at launch.';msg.style.color='#E8503F';form.reset();}
    else{msg.textContent='Something went wrong — please try again.';msg.style.color='#c0392b';}
  }catch(err){msg.textContent='Network error — please try again.';msg.style.color='#c0392b';}
});
</script>
</body>
</html>
